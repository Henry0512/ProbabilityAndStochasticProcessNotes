name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args:  -r latexmkrc

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Notes_on_Probability_and_Stochastic_Process
          path: Notes_on_Probability_and_Stochastic_Process.pdf
          retention-days: 30
